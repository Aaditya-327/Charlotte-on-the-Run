<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Charlotte On The Run — Events</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏃</text></svg>"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="CLT On The Run"/>
<meta name="theme-color" content="#0a0a0a"/>
<meta name="description" content="Upcoming events in Charlotte NC and surrounding areas. Updated daily from 23 curated sources."/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  /* Pure black surfaces */
  --paper-0:#0a0a0a; --paper-1:#111111; --paper-2:#181818; --paper-3:#222222;
  /* Clean white ink */
  --ink-0:#ffffff; --ink-1:#e8e8e8; --ink-2:#999999; --ink-3:#555555; --ink-4:#333333;
  /* Accent: electric violet-blue — clean, modern */
  --rust-50:rgba(139,92,246,.12); --rust-100:rgba(139,92,246,.2); --rust-300:#7c3aed;
  --rust-500:#8b5cf6; --rust-600:#a78bfa; --rust-700:#c4b5fd;
  /* Semantic */
  --good-500:#4ade80; --good-50:rgba(74,222,128,.1);
  --warn-500:#fbbf24; --warn-50:rgba(251,191,36,.1);
  --bad-500:#f87171;  --bad-50:rgba(248,113,113,.1);
  --info-500:#60a5fa; --info-50:rgba(96,165,250,.1);
  /* Borders */
  --border-faint:#1a1a1a; --border-soft:#262626; --border-strong:#333333;
  --font-sans:'Geist',-apple-system,BlinkMacSystemFont,'Inter',system-ui,sans-serif;
  --font-mono:'Geist Mono',ui-monospace,'SF Mono',Menlo,monospace;
  --ease-out:cubic-bezier(.2,0,0,1);
  --dur-fast:120ms; --dur-base:180ms;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:13px;background:var(--paper-0);color:var(--ink-1);font-family:var(--font-sans);-webkit-font-smoothing:antialiased}
body{min-height:100vh;display:flex;flex-direction:column}

/* ── Layout ── */
.site-header{
  position:sticky;top:0;z-index:50;
  background:rgba(10,10,10,.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border-faint);
  padding:0 24px;
  height:52px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;
}
.header-brand{display:flex;align-items:center;gap:10px;text-decoration:none}
.brand-dot{width:8px;height:8px;border-radius:50%;background:var(--rust-500);box-shadow:0 0 8px var(--rust-500);flex-shrink:0}
.brand-name{font-size:14px;font-weight:600;color:var(--ink-0);letter-spacing:-0.01em}
.brand-sub{font-size:11px;color:var(--ink-3);font-family:var(--font-mono)}
.header-meta{font-size:11px;color:var(--ink-3);font-family:var(--font-mono);white-space:nowrap}

main{flex:1;max-width:1100px;margin:0 auto;width:100%;padding:32px 24px 64px}

/* ── Stats bar ── */
.stats-bar{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:1px;
  background:var(--border-faint);border:1px solid var(--border-faint);
  border-radius:8px;overflow:hidden;margin-bottom:28px;
}
.stat-cell{
  background:var(--paper-1);
  padding:14px 18px;
  display:flex;flex-direction:column;gap:4px;
}
.stat-label{font-size:10px;font-weight:500;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--font-mono)}
.stat-value{font-size:22px;font-weight:600;color:var(--ink-0);font-family:var(--font-mono);letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
.stat-sub{font-size:11px;color:var(--ink-3)}

/* ── Controls ── */
.controls{display:flex;flex-direction:column;gap:10px;margin-bottom:24px}
.control-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.search-wrap{position:relative;flex:1;min-width:200px}
.search-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--ink-3);pointer-events:none}
.search-input{
  width:100%;background:var(--paper-1);border:1px solid var(--border-soft);
  border-radius:5px;padding:7px 10px 7px 34px;font-size:13px;font-family:var(--font-sans);
  color:var(--ink-0);outline:none;transition:border-color var(--dur-fast) var(--ease-out),box-shadow var(--dur-fast) var(--ease-out);
}
.search-input::placeholder{color:var(--ink-3)}
.search-input:focus{border-color:var(--rust-500);box-shadow:0 0 0 2px var(--rust-50)}
.results-count{font-size:11px;color:var(--ink-3);font-family:var(--font-mono)}

/* Mode selector */
.mode-row{display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.mode-chip{
  font-size:12px;font-weight:500;padding:6px 14px;border-radius:6px;
  border:1px solid var(--border-soft);background:var(--paper-1);color:var(--ink-2);
  cursor:pointer;transition:all var(--dur-fast) var(--ease-out);white-space:nowrap;font-family:var(--font-sans);
}
.mode-chip:hover{background:var(--paper-3);color:var(--ink-0);border-color:var(--border-strong)}
.mode-chip.active{color:#fff;font-weight:600}
.mode-chip[data-mode="all"].active{background:var(--rust-500);border-color:var(--rust-500)}
.mode-chip[data-mode="free"].active{background:#4ade80;border-color:#4ade80;color:var(--paper-0)}
.mode-chip[data-mode="ai"].active{background:#a78bfa;border-color:#a78bfa;color:var(--paper-0)}
.mode-chip[data-mode="weird"].active{background:#fb923c;border-color:#fb923c;color:var(--paper-0)}

/* Filter chips */
.chips{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.chip-label{font-size:10px;font-weight:500;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--font-mono);white-space:nowrap}
.chip{
  font-size:11px;font-weight:500;padding:4px 10px;border-radius:999px;
  border:1px solid var(--border-soft);background:var(--paper-1);color:var(--ink-2);
  cursor:pointer;transition:all var(--dur-fast) var(--ease-out);white-space:nowrap;font-family:var(--font-sans);
}
.chip:hover{background:var(--paper-3);color:var(--ink-0);border-color:var(--border-strong)}
.chip.active{background:var(--rust-500);color:var(--paper-0);border-color:var(--rust-500);font-weight:600}
/* Tier chips (inside AI mode) */
.tier-chip{
  font-size:11px;font-weight:500;padding:4px 11px;border-radius:6px;
  border:1px solid var(--border-soft);background:var(--paper-2);color:var(--ink-2);
  cursor:pointer;transition:all var(--dur-fast) var(--ease-out);white-space:nowrap;font-family:var(--font-sans);
}
.tier-chip:hover{background:var(--paper-3);color:var(--ink-0)}
.tier-chip.active{background:rgba(139,92,246,.15);color:var(--rust-600);border-color:rgba(139,92,246,.4);font-weight:600}

/* ── Grid ── */
.events-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(320px,1fr));
  gap:12px;
}
.event-card{
  background:var(--paper-1);border:1px solid var(--border-faint);border-radius:8px;
  padding:16px;display:flex;flex-direction:column;gap:10px;
  transition:border-color var(--dur-base) var(--ease-out),transform var(--dur-base) var(--ease-out),box-shadow var(--dur-base) var(--ease-out);
  text-decoration:none;cursor:pointer;position:relative;overflow:hidden;
}
.event-card::before{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--rust-500),transparent);
  opacity:0;transition:opacity var(--dur-base) var(--ease-out);
}
.event-card:hover{border-color:var(--border-strong);transform:translateY(-1px);box-shadow:0 8px 24px rgba(0,0,0,.4)}
.event-card:hover::before{opacity:1}

.card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.card-source{font-size:10px;font-weight:500;color:var(--ink-3);text-transform:uppercase;letter-spacing:.08em;font-family:var(--font-mono)}
.card-badges{display:flex;gap:4px;flex-wrap:wrap;flex-shrink:0}
.badge{
  font-size:10px;font-weight:500;padding:2px 7px;border-radius:999px;
  border:1px solid transparent;display:inline-flex;align-items:center;gap:3px;line-height:1.4;
}
.badge-region{background:var(--paper-2);color:var(--ink-2);border-color:var(--border-soft)}
.badge-free{background:var(--good-50);color:var(--good-500)}
.badge-price{background:var(--warn-50);color:var(--warn-500)}
.badge-conf-high{background:var(--info-50);color:var(--info-500)}
.badge-conf-low{background:var(--paper-2);color:var(--ink-3);border-color:var(--border-faint)}
.badge-dist{background:var(--paper-2);color:var(--ink-3);border-color:var(--border-faint);font-family:var(--font-mono)}
.badge-ai{background:rgba(139,92,246,.18);color:var(--rust-600);border-color:rgba(139,92,246,.3)}

/* AI card variant */
.event-card.ai-card{border-color:rgba(139,92,246,.3);box-shadow:0 0 14px rgba(139,92,246,.07)}
.event-card.ai-card::before{background:linear-gradient(90deg,var(--rust-500),#a78bfa,transparent);opacity:.5}
.event-card.ai-card:hover{border-color:rgba(139,92,246,.6);box-shadow:0 8px 28px rgba(139,92,246,.22);transform:translateY(-1px)}
/* Wild card variant — orange flare */
.event-card.wild-card{border-color:rgba(251,146,60,.35);box-shadow:0 0 14px rgba(251,146,60,.08)}
.event-card.wild-card::before{background:linear-gradient(90deg,#fb923c,#fbbf24,transparent);opacity:.5}
.event-card.wild-card:hover{border-color:rgba(251,146,60,.6);box-shadow:0 8px 28px rgba(251,146,60,.2);transform:translateY(-1px)}
/* Baseline / Staples card — warm amber anchor */
.event-card.baseline-card{border-color:rgba(251,191,36,.25);box-shadow:0 0 12px rgba(251,191,36,.05)}
.event-card.baseline-card::before{background:linear-gradient(90deg,#fbbf24,#f59e0b,transparent);opacity:.4}
.event-card.baseline-card:hover{border-color:rgba(251,191,36,.55);box-shadow:0 8px 24px rgba(251,191,36,.15);transform:translateY(-1px)}

.card-title{font-size:14px;font-weight:600;color:var(--ink-0);line-height:1.35;letter-spacing:-.01em}
.card-desc{font-size:12px;color:var(--ink-2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-footer{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:auto;padding-top:4px}
.card-date{font-size:11px;font-family:var(--font-mono);color:var(--rust-500);font-weight:500;display:flex;align-items:center;gap:5px}
.card-date.no-date{color:var(--ink-3)}
.card-link-icon{color:var(--ink-4);transition:color var(--dur-fast)}
.event-card:hover .card-link-icon{color:var(--rust-500)}

/* ── Card expand modal ── */
#card-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.72);backdrop-filter:blur(4px);
  z-index:100;opacity:0;pointer-events:none;
  transition:opacity var(--dur-base) var(--ease-out);
}
#card-overlay.open{opacity:1;pointer-events:auto}
#card-modal{
  position:fixed;top:50%;left:50%;
  transform:translate(-50%,-54%);
  z-index:101;width:min(540px,calc(100vw - 32px));
  max-height:calc(100vh - 64px);overflow-y:auto;
  background:var(--paper-1);border:1px solid var(--border-strong);
  border-radius:12px;padding:22px;display:flex;flex-direction:column;gap:12px;
  opacity:0;pointer-events:none;
  transition:opacity var(--dur-base) var(--ease-out),transform var(--dur-base) var(--ease-out);
}
#card-modal.open{opacity:1;pointer-events:auto;transform:translate(-50%,-50%)}
.modal-desc{font-size:13px;color:var(--ink-1);line-height:1.65}
.modal-open-link{
  align-self:flex-start;display:inline-flex;align-items:center;gap:7px;
  font-size:12px;font-weight:500;padding:8px 16px;border-radius:6px;
  background:var(--rust-500);color:#fff;border:1px solid var(--rust-500);
  text-decoration:none;transition:all var(--dur-fast) var(--ease-out);
}
.modal-open-link:hover{background:var(--rust-300);border-color:var(--rust-300)}

/* ── Empty state ── */
.empty{text-align:center;padding:80px 24px;color:var(--ink-3)}
.empty-icon{font-size:40px;margin-bottom:16px;opacity:.4}
.empty-title{font-size:16px;font-weight:600;color:var(--ink-2);margin-bottom:6px}
.empty-sub{font-size:13px}

/* ── Footer ── */
footer{border-top:1px solid var(--border-faint);padding:20px 24px;text-align:center;font-size:11px;color:var(--ink-4);font-family:var(--font-mono)}

/* ── Loading skeleton ── */
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.skeleton{
  background:linear-gradient(90deg,var(--paper-2) 25%,var(--paper-3) 50%,var(--paper-2) 75%);
  background-size:800px 100%;
  animation:shimmer 1.5s infinite;
  border-radius:3px;
}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:var(--paper-0)}
::-webkit-scrollbar-thumb{background:var(--border-strong);border-radius:3px}

/* Responsive */
@media(max-width:600px){
  .site-header{padding:0 16px}
  main{padding:20px 16px 48px}
  .stats-bar{grid-template-columns:repeat(2,1fr)}
  .brand-sub{display:none}
  .header-meta{display:none}
  .events-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header class="site-header">
  <a class="header-brand" href="#">
    <span class="brand-dot"></span>
    <span class="brand-name">Charlotte On The Run</span>
    <span class="brand-sub">/ events</span>
  </a>
  <span class="header-meta" id="last-updated">Loading…</span>
</header>

<main>

  <!-- Stats -->
  <div class="stats-bar" id="stats-bar">
    <div class="stat-cell"><div class="stat-label">Total Events</div><div class="stat-value" id="stat-total">—</div><div class="stat-sub">RSS + AI cards</div></div>
    <div class="stat-cell"><div class="stat-label">With Dates</div><div class="stat-value" id="stat-dated">—</div><div class="stat-sub">confirmed date</div></div>
    <div class="stat-cell"><div class="stat-label">Free Events</div><div class="stat-value" id="stat-free">—</div><div class="stat-sub">no admission</div></div>
    <div class="stat-cell"><div class="stat-label">Regions</div><div class="stat-value" id="stat-regions">5</div><div class="stat-sub">up to 2.5h away</div></div>
  </div>

  <!-- Controls -->
  <div class="controls">

    <!-- Row 1: Search -->
    <div class="control-row">
      <div class="search-wrap">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input class="search-input" id="search-input" type="text" placeholder="Search events, venues, keywords…" autocomplete="off" spellcheck="false"/>
      </div>
      <span class="results-count" id="results-count"></span>
    </div>

    <!-- Row 2: Mode selector -->
    <div class="control-row">
      <div class="mode-row">
        <button class="mode-chip active" data-mode="all"   onclick="setMode('all')">All</button>
        <button class="mode-chip"        data-mode="free"  onclick="setMode('free')">🆓 Free</button>
        <button class="mode-chip"        data-mode="ai"    onclick="setMode('ai')">✦ AI Guide</button>
        <button class="mode-chip"        data-mode="weird" onclick="setMode('weird')">🎪 Weird</button>
      </div>
    </div>

    <!-- Row 3: AI tier — only visible in AI mode -->
    <div class="control-row" id="tier-row" style="display:none">
      <span class="chip-label">Tier</span>
      <div class="chips" id="tier-chips"></div>
    </div>

    <!-- Row 4: Time + Region -->
    <div class="control-row">
      <div class="chips" id="time-chips">
        <button class="chip active" data-time="all"     onclick="setTime('all')">All time</button>
        <button class="chip"        data-time="today"   onclick="setTime('today')">Today</button>
        <button class="chip"        data-time="weekend" onclick="setTime('weekend')">Weekend</button>
        <button class="chip"        data-time="week"    onclick="setTime('week')">This week</button>
      </div>
      <span style="width:1px;height:16px;background:var(--border-soft);flex-shrink:0;margin:0 2px"></span>
      <div class="chips" id="region-chips"></div>
    </div>

    <!-- Row 5: Category (dynamic, only when AI cards have categories) -->
    <div class="control-row" id="cat-row" style="display:none">
      <span class="chip-label">Category</span>
      <div class="chips" id="cat-chips"></div>
    </div>

  </div>

  <!-- Grid -->
  <div class="events-grid" id="events-grid"></div>
  <div class="empty" id="empty-state" style="display:none">
    <div class="empty-icon">🔭</div>
    <div class="empty-title">No events found</div>
    <div class="empty-sub">Try adjusting your filters or search term.</div>
  </div>

</main>

<div id="card-overlay" onclick="closeCard()"></div>
<div id="card-modal" role="dialog" aria-modal="true"></div>

<footer id="footer">Charlotte On The Run · Built with 23 curated RSS feeds · <a href="https://github.com/Aaditya-327/Charlotte-on-the-Run" style="color:var(--rust-500);text-decoration:none">GitHub</a><span id="run-cost-display"></span></footer>

<script src="events_data.js"></script>
<script src="daily_guide_data.js"></script>
<script>
// ── State ─────────────────────────────────────────────────────────────────────
let activeRegion = 'all';
let activeTime   = 'all';
let activeMode   = 'all';   // 'all' | 'free' | 'ai' | 'weird'
let activeTier   = 'free';
let activeCats   = new Set();
let searchQ      = '';

const TODAY = new Date();
TODAY.setHours(0,0,0,0);

function isoToDate(s){ if(!s) return null; const [y,m,d]=s.split('-').map(Number); return new Date(y,m-1,d); }

function getWeekend(){
  const wd = TODAY.getDay();
  const fri = new Date(TODAY); fri.setDate(TODAY.getDate() + ((5-wd+7)%7 || 7));
  const sun = new Date(fri); sun.setDate(fri.getDate()+2);
  const start = (wd>=5||wd===0) ? TODAY : fri;
  return {start, end: sun};
}
function getWeekEnd(){ const d = new Date(TODAY); d.setDate(TODAY.getDate()+6); return d; }

// ── Parse AI guide cards (structured JSON from Gemini) ─────────────────────
const CATEGORIES = [
  { id:'music',     label:'🎵 Music' },
  { id:'food',      label:'🍽 Food' },
  { id:'drinks',    label:'🍺 Drinks' },
  { id:'arts',      label:'🎨 Arts' },
  { id:'outdoors',  label:'🌿 Outdoors' },
  { id:'nightlife', label:'🌃 Nightlife' },
  { id:'comedy',    label:'😂 Comedy' },
  { id:'sports',    label:'⚡ Sports' },
  { id:'theater',   label:'🎭 Theater' },
  { id:'fitness',   label:'🏃 Fitness' },
  { id:'market',    label:'🛍 Market' },
  { id:'drag',      label:'💅 Drag' },
  { id:'film',      label:'🎬 Film' },
  { id:'weird',     label:'🎪 Weird' },
  { id:'family',    label:'👨‍👩‍👧 Family' },
];
const CAT_MAP = Object.fromEntries(CATEGORIES.map(c => [c.id, c]));

const TIER_META = {
  baseline: { label: '📍 Staples',    color: '#fbbf24' },
  free:     { label: '🆓 Free',       color: 'var(--good-500)' },
  under20:  { label: '💵 Under $20',  color: 'var(--warn-500)' },
  under50:  { label: '🍸 Under $50',  color: 'var(--rust-600)' },
  splurge:  { label: '🌟 Splurge',    color: '#f472b6' },
  wildcard: { label: '🎪 Wild Card',  color: '#fb923c' },
};
const PERIOD_ORDER = { morning: 0, afternoon: 1, evening: 2, night: 3 };

function parseGuideCards() {
  if (typeof DAILY_GUIDE_DATA === 'undefined') return [];
  const cards = [];
  for (const tier of DAILY_GUIDE_DATA.tiers) {
    for (const act of (tier.activities || [])) {
      cards.push({
        _ai:         true,
        tier:        tier.id,
        tier_label:  TIER_META[tier.id]?.label || tier.label,
        tier_color:  TIER_META[tier.id]?.color || 'var(--rust-500)',
        title:       act.title,
        description: act.description,
        location:    act.location || '',
        cost:        act.cost || '',
        tags:        act.tags || [],
        category:    act.category || [],
        day:         act.day,
        period:      act.period,
        source:      'AI Guide',
        link:        null,
      });
    }
  }
  // Sort: today first, then by time of day
  cards.sort((a, b) => {
    if (a.day !== b.day) return a.day === 'today' ? -1 : 1;
    return (PERIOD_ORDER[a.period] ?? 9) - (PERIOD_ORDER[b.period] ?? 9);
  });
  return cards;
}

const AI_CARDS = parseGuideCards();


// ── Region chips ──────────────────────────────────────────────────────────────
const REGIONS = ['all','Charlotte','Triad','Greenville SC','Asheville','Triangle NC'];
const regionChips = document.getElementById('region-chips');
REGIONS.forEach(r => {
  const b = document.createElement('button');
  b.className = 'chip' + (r==='all'?' active':'');
  b.dataset.region = r;
  b.textContent = r === 'all' ? 'All regions' : r;

// ── Filter ────────────────────────────────────────────────────────────────────
function filterEvents(){
  return EVENTS_DATA.filter(ev => {
    if(activeRegion !== 'all' && ev.region !== activeRegion) return false;
    if(searchQ && !ev.title.toLowerCase().includes(searchQ) && !(ev.description||'').toLowerCase().includes(searchQ)) return false;

    const ed = isoToDate(ev.event_date);

    if(activeTime === 'today'){
      if(!ed) return false;
      return ed.getTime() === TODAY.getTime();
    }
    if(activeTime === 'weekend'){
      if(!ed) return false;
      const {start,end} = getWeekend();
      return ed >= start && ed <= end;
    }
    if(activeTime === 'week'){
      if(!ed) return false;
      return ed >= TODAY && ed <= getWeekEnd();
    }
    return true;
  });
}

// ── Card builder ─────────────────────────────────────────────────────────────
function formatDate(ev){
  if(!ev.event_date) return null;
  const d = isoToDate(ev.event_date);
  const opts = {weekday:'short',month:'short',day:'numeric'};
  let s = d.toLocaleDateString('en-US', opts);
  if(ev.event_time){
    const [h,m] = ev.event_time.split(':').map(Number);
    const ap = h>=12?'pm':'am';
    const hh = h%12||12;
    s += ` · ${hh}${m?':'+String(m).padStart(2,'0'):''}${ap}`;
  }
  return s;
}

// ── Card share (canvas → Web Share API → iMessage) ───────────────────────────
let _currentCard = null;

function _rrPath(ctx, x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x+r, y);
  ctx.lineTo(x+w-r, y); ctx.quadraticCurveTo(x+w, y, x+w, y+r);
  ctx.lineTo(x+w, y+h-r); ctx.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  ctx.lineTo(x+r, y+h); ctx.quadraticCurveTo(x, y+h, x, y+h-r);
  ctx.lineTo(x, y+r); ctx.quadraticCurveTo(x, y, x+r, y);
  ctx.closePath();
}

function _wrapText(ctx, text, x, y, maxW, lh){
  if(!text) return 0;
  const words = text.split(' ');
  let line = '', rows = [];
  for(const w of words){
    const t = line + w + ' ';
    if(ctx.measureText(t).width > maxW && line){ rows.push(line.trimEnd()); line = w + ' '; }
    else line = t;
  }
  if(line.trim()) rows.push(line.trimEnd());
  rows.forEach((r,i) => ctx.fillText(r, x, y + i*lh));
  return rows.length * lh;
}

async function shareCard(){
  const ev = _currentCard;
  if(!ev) return;

  const S = 2, PAD = 28, W = 560;
  const isWild = ev._ai && ev.tier === 'wildcard';
  const accentA = isWild ? '#fb923c' : '#8b5cf6';
  const accentB = isWild ? '#fbbf24' : '#a78bfa';
  const desc  = ev._ai ? (ev.description||'') : cleanDesc(ev.description);
  const tags  = (ev.tags||[]).slice(0,4);
  const inner = W - PAD*2;

  // ── Measure pass ──────────────────────────────────────────────────────────
  const mc = document.createElement('canvas');
  mc.width = W; mc.height = 1;
  const mx = mc.getContext('2d');
  function countLines(font, text, mw){
    mx.font = font;
    const words = text.split(' '); let line='', n=1;
    for(const w of words){ const t=line+w+' '; if(mx.measureText(t).width>mw&&line){n++;line=w+' ';}else line=t; }
    return n;
  }
  const titleLines = countLines('700 17px system-ui', ev.title||'', inner);
  const descLines  = countLines('400 13px system-ui', desc, inner);

  let H = PAD + 18 + 10                  // top + source row + gap
        + titleLines*23 + 10             // title
        + (ev.location ? 20 : 0)         // location
        + 6 + descLines*20 + 10          // description
        + (tags.length ? 20 + 6 : 0)     // tags
        + 1 + 16 + 20 + PAD;             // separator + footer + bottom

  // ── Draw pass ─────────────────────────────────────────────────────────────
  const cv = document.createElement('canvas');
  cv.width = W*S; cv.height = H*S;
  const cx = cv.getContext('2d');
  cx.scale(S, S);

  // Background
  cx.fillStyle = '#111111';
  _rrPath(cx, 0, 0, W, H, 14); cx.fill();

  // Top accent bar
  const g = cx.createLinearGradient(0,0,W*.65,0);
  g.addColorStop(0, accentA); g.addColorStop(0.8, accentB); g.addColorStop(1,'transparent');
  cx.fillStyle = g; cx.fillRect(0, 0, W, 3);
  // Round the top corners of the bar
  cx.fillStyle = '#111111'; cx.fillRect(0, 3, W, 1);

  let cy = PAD;

  // Source label
  cx.font = '500 10px system-ui,sans-serif';
  cx.fillStyle = '#555555';
  cx.textBaseline = 'middle';
  const sourceLabel = ev._ai
    ? ('✦ AI Guide' + (ev.period ? ' · ' + ev.period : ''))
    : (ev.source || '');
  cx.fillText(sourceLabel.toUpperCase(), PAD, cy + 9);

  // Cost / tier badge (right-aligned)
  const badgeText = ev._ai ? (ev.cost||ev.tier_label||'') : (ev.price==='free'?'FREE':(ev.price||ev.region||''));
  if(badgeText){
    cx.font = '500 10px system-ui,sans-serif';
    const bw = cx.measureText(badgeText).width + 14;
    cx.fillStyle = '#1e1e1e';
    _rrPath(cx, W-PAD-bw, cy, bw, 18, 4); cx.fill();
    cx.fillStyle = '#777777';
    cx.textAlign = 'center';
    cx.fillText(badgeText, W-PAD-bw/2, cy+9);
    cx.textAlign = 'left';
  }
  cy += 28;

  // Title
  cx.font = '700 17px system-ui,sans-serif';
  cx.fillStyle = '#f0f0f0';
  cy += _wrapText(cx, ev.title||'', PAD, cy, inner, 23);
  cy += 10;

  // Location
  if(ev.location){
    cx.font = '400 11px ui-monospace,monospace';
    cx.fillStyle = '#4a4a4a';
    cx.fillText('📍 ' + ev.location, PAD, cy);
    cy += 20;
  }
  cy += 4;

  // Description
  cx.font = '400 13px system-ui,sans-serif';
  cx.fillStyle = '#888888';
  cy += _wrapText(cx, desc, PAD, cy, inner, 20);
  cy += 12;

  // Tags
  if(tags.length){
    cx.font = '400 11px ui-monospace,monospace';
    cx.fillStyle = '#3a3a3a';
    cx.fillText(tags.map(t=>'#'+t).join('   '), PAD, cy);
    cy += 20;
  }

  // Separator
  cx.strokeStyle = '#222222'; cx.lineWidth = 1;
  cx.beginPath(); cx.moveTo(PAD, cy); cx.lineTo(W-PAD, cy); cx.stroke();
  cy += 14;

  // Footer: date left, branding right
  cx.font = '500 11px system-ui,sans-serif';
  const dateStr = ev._ai ? (ev.day==='today'?'Today':'Tomorrow') : (formatDate(ev)||'Date TBD');
  cx.fillStyle = accentA;
  cx.fillText(dateStr, PAD, cy);
  cx.textAlign = 'right';
  cx.fillStyle = '#333333';
  cx.fillText('Charlotte On The Run 🏃', W-PAD, cy);
  cx.textAlign = 'left';

  // ── Share / fallback ──────────────────────────────────────────────────────
  cv.toBlob(async blob => {
    const file = new File([blob], 'event-card.png', { type:'image/png' });
    if(navigator.share && navigator.canShare && navigator.canShare({ files:[file] })){
      try{ await navigator.share({ files:[file], title: ev.title }); }
      catch(e){ if(e.name!=='AbortError') console.warn(e); }
    } else {
      // Desktop fallback: download the image
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'event-card.png'; a.click();
      setTimeout(()=>URL.revokeObjectURL(url), 1000);
    }
  }, 'image/png');
}

function makeWildDivider(label){
  const d = document.createElement('div');
  d.style.cssText = 'grid-column:1/-1;display:flex;align-items:center;gap:10px;padding:6px 0 4px';
  d.innerHTML = `
    <span style="font-size:10px;font-weight:600;color:#fb923c;text-transform:uppercase;letter-spacing:.08em;font-family:var(--font-mono);white-space:nowrap;display:flex;align-items:center;gap:5px">
      <span style="font-size:12px">🎪</span>${label}
    </span>
    <span style="flex:1;height:1px;background:linear-gradient(90deg,rgba(251,146,60,.4),transparent)"></span>
  `;
  return d;
}

// ── Render ────────────────────────────────────────────────────────────────────
function render(){
  const grid  = document.getElementById('events-grid');
  const empty = document.getElementById('empty-state');
  const count = document.getElementById('results-count');
  grid.innerHTML = '';

  const catOK = c => activeCats.size === 0 || (c.category||[]).some(cat => activeCats.has(cat));

  // ── AI mode ────────────────────────────────────────────────────────────────
  if(activeMode === 'ai'){
    const tierCards = AI_CARDS.filter(c =>
      c.tier === activeTier && catOK(c)
    );
    if(tierCards.length === 0){
      grid.style.display='none'; empty.style.display='block';
      count.textContent = '0 suggestions';
      return;
    }
    grid.style.display='grid'; empty.style.display='none';
    const todayAI    = tierCards.filter(c => c.day === 'today');
    const tomorrowAI = tierCards.filter(c => c.day === 'tomorrow');
    if(todayAI.length){    grid.appendChild(makeAIDivider('Today'));    todayAI.forEach(c => grid.appendChild(buildAICard(c))); }
    if(tomorrowAI.length){ grid.appendChild(makeAIDivider('Tomorrow')); tomorrowAI.forEach(c => grid.appendChild(buildAICard(c))); }
    count.textContent = `${tierCards.length} suggestion${tierCards.length===1?'':'s'}`;
    return;
  }

  // ── Weird mode ─────────────────────────────────────────────────────────────
  if(activeMode === 'weird'){
    const cards = AI_CARDS.filter(c => c.tier === 'wildcard');
    if(cards.length === 0){
      grid.style.display='none'; empty.style.display='block';
      count.textContent = '0 weird picks';
      return;
    }
    grid.style.display='grid'; empty.style.display='none';
    const t = cards.filter(c => c.day === 'today');
    const tm = cards.filter(c => c.day === 'tomorrow');
    if(t.length){  grid.appendChild(makeWildDivider('Today'));    t.forEach(c => grid.appendChild(buildAICard(c))); }
    if(tm.length){ grid.appendChild(makeWildDivider('Tomorrow')); tm.forEach(c => grid.appendChild(buildAICard(c))); }
    count.textContent = `${cards.length} weird pick${cards.length===1?'':'s'}`;
    return;
  }

  // ── Free mode ──────────────────────────────────────────────────────────────
  if(activeMode === 'free'){
    const filtered   = filterEvents().filter(e => e.price === 'free');
    const freeAI     = AI_CARDS.filter(c => c.tier === 'free'     && c.day === 'today' && catOK(c));
    const baselineAI = AI_CARDS.filter(c => c.tier === 'baseline' && c.day === 'today' && catOK(c));
    const dated      = filtered.filter(e => e.event_date);
    const undated    = filtered.filter(e => !e.event_date);
    if(filtered.length === 0 && freeAI.length === 0 && baselineAI.length === 0){
      grid.style.display='none'; empty.style.display='block';
      count.textContent = '0 free events';
      return;
    }
    grid.style.display='grid'; empty.style.display='none';
    if(dated.length){ grid.appendChild(makeDivider(`${dated.length} confirmed free events`)); dated.forEach(ev => grid.appendChild(buildCard(ev))); }
    if(freeAI.length){ grid.appendChild(makeAIDivider('✦ AI Free Picks · Today')); freeAI.forEach(c => grid.appendChild(buildAICard(c))); }
    if(baselineAI.length){ grid.appendChild(makeBaselineDivider('Staples · Always Good')); baselineAI.forEach(c => grid.appendChild(buildAICard(c))); }
    if(undated.length){ grid.appendChild(makeDivider(`${undated.length} free — date TBD`)); undated.forEach(ev => grid.appendChild(buildCard(ev))); }
    count.textContent = `${filtered.length + freeAI.length + baselineAI.length} free`;
    return;
  }

  // ── All / mixed mode ────────────────────────────────────────────────────────
  const filtered = filterEvents();
  const dated    = filtered.filter(e => e.event_date);
  const undated  = filtered.filter(e => !e.event_date);
  const mixTier  = ['free','under20','under50','splurge'].find(t => AI_CARDS.some(c => c.tier === t)) || 'free';
  const mixAI    = AI_CARDS.filter(c => c.tier === mixTier && c.day === 'today' && catOK(c));
  const mixWild  = AI_CARDS.filter(c => c.tier === 'wildcard' && c.day === 'today' && catOK(c));

  if(filtered.length === 0 && mixAI.length === 0 && mixWild.length === 0){
    grid.style.display='none'; empty.style.display='block';
    count.textContent = '0 events';
    return;
  }
  grid.style.display='grid'; empty.style.display='none';

  if(dated.length){
    grid.appendChild(makeDivider(`${dated.length} confirmed date${dated.length===1?'':'s'}`));
    dated.forEach(ev => grid.appendChild(buildCard(ev)));
  }
  if(mixAI.length){
    grid.appendChild(makeAIDivider('AI Picks · Today'));
    mixAI.forEach(c => grid.appendChild(buildAICard(c)));
  }
  if(mixWild.length){
    grid.appendChild(makeWildDivider('Wild Card · Weird &amp; Novel'));
    mixWild.forEach(c => grid.appendChild(buildAICard(c)));
  }
  if(undated.length){
    grid.appendChild(makeDivider(`${undated.length} article${undated.length===1?'':'s'} — date TBD`));
    undated.forEach(ev => grid.appendChild(buildCard(ev)));
  }
  const aiCount = mixAI.length + mixWild.length;
  count.textContent = `${filtered.length} event${filtered.length===1?'':'s'} · ${aiCount} AI`;
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function initStats(){
  const aiCount = (typeof AI_CARDS !== 'undefined') ? AI_CARDS.length : 0;
  const total   = EVENTS_DATA.length + aiCount;
  const dated   = EVENTS_DATA.filter(e=>e.event_date).length;
  const free    = EVENTS_DATA.filter(e=>e.price==='free').length;
  const regions = new Set(EVENTS_DATA.map(e=>e.region)).size;

  document.getElementById('stat-total').textContent   = total;
  document.getElementById('stat-dated').textContent   = dated;
  document.getElementById('stat-free').textContent    = free;
  document.getElementById('stat-regions').textContent = regions;

  // last updated: find latest pub_date
  const dates = EVENTS_DATA.map(e=>e.pub_date).filter(Boolean).sort();
  const latest = dates[dates.length-1];
  if(latest){
    const d = new Date(latest);
    document.getElementById('last-updated').textContent =
      'Updated ' + d.toLocaleDateString('en-US',{month:'short',day:'numeric',hour:'numeric',minute:'2-digit'});
  }
}

// ── Run cost display ──────────────────────────────────────────────────────────
function initRunCost(){
  if(typeof DAILY_GUIDE_DATA === 'undefined') return;
  const rc = DAILY_GUIDE_DATA.run_cost;
  if(!rc) return;
  const tok   = ((rc.input_tokens + rc.output_tokens) / 1000).toFixed(1);
  const usd   = rc.approx_usd != null ? `~$${Number(rc.approx_usd).toFixed(3)}` : '';
  const calls = rc.search_calls != null ? `${rc.search_calls} searches` : '';
  const parts = [tok + 'K tokens', calls, usd].filter(Boolean);
  const el = document.getElementById('run-cost-display');
  if(el && parts.length) el.textContent = ' · AI run: ' + parts.join(' · ');
}

// ── Init ──────────────────────────────────────────────────────────────────────
document.addEventListener('keydown', e => { if(e.key === 'Escape') closeCard(); });
initStats();
initRunCost();
initTierChips();
initCategoryChips();
render();
</script>
